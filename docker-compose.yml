services:
  gatsby:
    build:
      context: .
      dockerfile: Dockerfile.development
    ports:
      - 8000:8000
    volumes:
      - ./src:/opt/app/src
      - ./static:/opt/app/static
      - ./public:/opt/app/public
    environment:
      BASE_URL: http://localhost:3000
    networks:
      - internal

networks:
  internal:
    driver: bridge
